<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact · Ramanpreet Kaur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F7F4EE;
      --ink: #1C1A17;
      --ink-soft: #4a4740;
      --terracotta: #9C5049;
      --muted: #7A7469;
      --rule: #D9D4CA;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 17px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--cream);
      border-bottom: 1px solid var(--rule);
    }
    .nav-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 40px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-links a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11.5px;
      letter-spacing: 0.04em;
      color: var(--ink-soft);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--terracotta); }
    .nav-contact {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--terracotta);
      color: var(--cream) !important;
      padding: 9px 20px;
      border-radius: 2px;
      transition: background 0.15s !important;
    }
    .nav-contact:hover { background: #874440; }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 40px;
      flex: 1;
    }

    section {
      padding: 96px 0 120px;
    }

    h2 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: clamp(36px, 5vw, 52px);
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin-bottom: 48px;
      line-height: 1.1;
    }

    .email-link {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 20px;
      color: var(--terracotta);
      text-decoration: none;
      display: block;
      margin-bottom: 48px;
      transition: opacity 0.15s;
    }
    .email-link:hover { opacity: 0.75; }

    .social-links {
      display: flex;
      gap: 32px;
    }
    .social-links a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--ink-soft);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }
    .social-links a:hover { color: var(--terracotta); }

    footer {
      border-top: 1px solid var(--rule);
      margin-top: auto;
    }
    .footer-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    footer a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--ink-soft);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }
    footer a:hover { color: var(--terracotta); }
    .footer-links { display: flex; gap: 28px; }

    @media (max-width: 600px) {
      .nav-inner { padding: 0 20px; }
      main { padding: 0 20px; }
      .footer-inner { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">✦ Ramanpreet Kaur</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="work.html">Work</a>
        <a href="contact.html" class="nav-contact">Contact</a>
      </div>
    </div>
  </nav>

  <main>
    <section>
      <h2>Get in touch</h2>
      <a href="mailto:ramanpreet2705@gmail.com" class="email-link">ramanpreet2705@gmail.com</a>
      <div class="social-links">
        <a href="https://www.linkedin.com/in/raman2705/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/raman2705" target="_blank" rel="noopener">GitHub</a>
        <a href="https://medium.com/@ramanpreet2705" target="_blank" rel="noopener">Medium</a>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <a href="mailto:ramanpreet2705@gmail.com">ramanpreet2705@gmail.com</a>
      <div class="footer-links">
        <a href="https://www.linkedin.com/in/raman2705/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://github.com/raman2705" target="_blank" rel="noopener">GitHub</a>
        <a href="https://medium.com/@ramanpreet2705" target="_blank" rel="noopener">Medium</a>
      </div>
    </div>
  </footer>

</body>
</html>
